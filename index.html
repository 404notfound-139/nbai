<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NBAI 人格测试</title>
  <style>
    :root {
      --bg: #f4f8f1;
      --card: #ffffff;
      --ink: #17231d;
      --muted: #66736b;
      --line: #dce7dd;
      --green: #356b4b;
      --acid: #d7ff56;
      --coral: #ff7a59;
      --blue: #4b7bec;
      --amber: #ffbd4a;
      --shadow: 0 22px 60px rgba(32, 58, 42, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(215,255,86,0.18), rgba(244,248,241,0) 280px),
        radial-gradient(circle at 12% 8%, rgba(255,122,89,.14), transparent 240px),
        var(--bg);
      min-height: 100vh;
    }
    button, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; transform: none !important; box-shadow: none !important; }
    .shell {
      width: min(920px, calc(100% - 32px));
      margin: 48px auto;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: clamp(28px, 6vw, 64px);
      text-align: center;
      overflow: hidden;
    }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 18px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
      background: #f8fbf6;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 18px auto 0;
      max-width: 640px;
      color: var(--muted);
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 1.7;
    }
    .subnote {
      margin: 10px auto 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 30px;
    }
    .btn {
      min-height: 46px;
      padding: 0 20px;
      border-radius: 8px;
      font-weight: 800;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--green);
      color: #fff;
      box-shadow: 0 10px 24px rgba(53,107,75,.22);
    }
    .btn-secondary {
      background: #f7faf6;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .btn-acid {
      background: var(--acid);
      color: var(--ink);
    }
    .hidden { display: none !important; }
    .panel {
      padding: clamp(18px, 4vw, 34px);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin-bottom: 20px;
      padding: 14px;
      background: rgba(244,248,241,.92);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }
    .progress-track {
      height: 10px;
      margin-top: 10px;
      background: #e8efe8;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--acid));
      transition: width .2s ease;
    }
    .question-list { display: grid; gap: 16px; }
    .question {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .meta {
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .question h3 {
      margin: 0 0 14px;
      font-size: clamp(18px, 2.4vw, 23px);
      line-height: 1.55;
    }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdf9;
      color: var(--ink);
      text-align: left;
      line-height: 1.5;
    }
    .option.selected {
      border-color: var(--green);
      background: #eff8ee;
      box-shadow: inset 0 0 0 1px var(--green);
    }
    .option-key {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 50%;
      font-size: 13px;
      font-weight: 900;
      color: var(--green);
      background: #fff;
    }
    .hint, .error {
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .error { color: #a13b2b; font-weight: 800; }
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      color: var(--ink);
      background: #fbfdf9;
      line-height: 1.6;
    }
    .field-label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 900;
    }
    .result-hero {
      padding: clamp(18px, 4vw, 28px);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f6fbf3 0%, #edf7ef 100%);
    }
    .result-poster {
      min-height: min(620px, calc(100vh - 150px));
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 32px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.78)),
        linear-gradient(135deg, #ffffff, #f0f9ef);
      text-align: center;
    }
    .result-poster > div {
      width: 100%;
      min-height: min(560px, calc(100vh - 205px));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .poster-title {
      margin: 0 0 8px;
      color: #5b675f;
      font-size: clamp(20px, 3.2vw, 34px);
      font-weight: 900;
      line-height: 1.15;
    }
    .poster-caption {
      width: 100%;
      align-self: stretch;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: clamp(14px, 1.9vw, 18px);
      line-height: 1.6;
      text-align: left;
    }
    .result-share-row {
      margin-top: 16px;
    }
    .result-share-row .btn {
      width: 100%;
      min-height: 56px;
      font-size: 18px;
    }
    .result-actions {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 22px;
    }
    .result-actions .btn {
      min-width: 132px;
      min-height: 68px;
      padding: 0 26px;
      border-radius: 18px;
      font-size: 22px;
      font-weight: 900;
    }
    .result-summary {
      padding: 24px;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .summary-label {
      color: var(--muted);
      font-size: 15px;
      font-weight: 900;
    }
    .summary-type {
      margin: 8px 0 0;
      color: var(--ink);
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.25;
    }
    .result-persona-img {
      display: block;
      width: min(390px, 76vw);
      height: auto;
      margin: 8px auto 0;
      object-fit: contain;
      mix-blend-mode: multiply;
    }
    .verdict {
      margin: 0;
      color: var(--green);
      font-size: clamp(30px, 5.2vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .nickname {
      margin: 4px 0 0;
      color: #244735;
      font-size: clamp(22px, 3.8vw, 38px);
      font-weight: 900;
    }
    .match {
      margin-top: 16px;
      font-weight: 800;
      color: var(--muted);
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    .tag {
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
    }
    .section {
      padding: 24px;
      border-top: 1px solid var(--line);
    }
    .section h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    .section p {
      color: var(--muted);
      line-height: 1.75;
      margin: 0;
    }
    .vocab {
      border-left: 5px solid var(--acid);
      background: #fbfdf1;
    }
    .dim-list { display: grid; gap: 10px; }
    .dim {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdf9;
    }
    .dim-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
    }
    .dim-desc {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
    body.share-open { overflow: hidden; }
    .share-overlay {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(12, 18, 15, .78);
      backdrop-filter: blur(4px);
    }
    .share-panel {
      width: min(640px, 100%);
      display: grid;
      justify-items: center;
      gap: 22px;
    }
    .share-card {
      width: min(440px, calc(100vw - 54px));
      padding: 22px;
      border-radius: 18px;
      background: #f8fcf8;
      box-shadow: 0 28px 90px rgba(0,0,0,.36);
    }
    .share-card-poster {
      padding: 18px 18px 0;
      background: #fff;
      text-align: center;
    }
    .share-card-title {
      margin: 0 0 6px;
      color: #5d675f;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
    }
    .share-card-type {
      margin: 0;
      color: var(--green);
      font-size: 36px;
      font-weight: 900;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }
    .share-card-key {
      margin: 4px 0 0;
      color: #185c33;
      font-size: 28px;
      font-weight: 900;
    }
    .share-card-img {
      display: block;
      width: min(260px, 72%);
      margin: 8px auto 0;
      mix-blend-mode: multiply;
    }
    .share-card-meta {
      display: grid;
      grid-template-columns: 1fr 118px;
      gap: 16px;
      align-items: end;
      padding-top: 18px;
    }
    .share-card-label {
      margin: 0 0 4px;
      color: var(--muted);
      font-weight: 800;
    }
    .share-card-main {
      margin: 0;
      color: var(--ink);
      font-size: 24px;
      font-weight: 900;
      line-height: 1.25;
    }
    .share-card-match {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 800;
    }
    .share-card-foot {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
    .share-qr {
      width: 118px;
      height: 118px;
      border-radius: 6px;
      background: #fff;
    }
    .share-save-preview {
      width: min(440px, calc(100vw - 54px));
      padding: 12px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 18px 60px rgba(0,0,0,.26);
    }
    .share-save-preview img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
    }
    .share-save-tip {
      margin: 10px 0 0;
      color: #fff;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }
    .share-actions {
      width: min(620px, 100%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px 24px;
    }
    .share-action {
      width: 76px;
      display: grid;
      justify-items: center;
      gap: 8px;
      color: #fff;
      background: transparent;
      font-weight: 800;
    }
    .share-icon {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
    }
    .share-icon.save { background: #6468d9; }
    .share-icon.wechat { background: #56bd43; }
    .share-icon.moments { background: #62cdb9; }
    .share-icon.qq { background: #45a8ec; }
    .share-icon.qzone { background: #f6c44d; }
    .share-icon.feed { background: #f56598; }
    .share-icon.weibo { background: #ed4d3f; }
    .share-close {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(255,255,255,.22);
      color: #fff;
      border: 1px solid rgba(255,255,255,.28);
      font-size: 34px;
      line-height: 1;
    }
    @media (max-width: 640px) {
      .shell { width: min(100% - 20px, 920px); margin: 20px auto; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
      .result-poster { min-height: min(560px, calc(100vh - 130px)); }
      .result-poster > div { min-height: min(500px, calc(100vh - 175px)); }
      .result-persona-img { width: min(300px, 78vw); }
      .tags { justify-content: center; }
      .result-actions { gap: 12px; }
      .result-actions .btn { min-width: 0; flex: 1 1 0; width: auto; font-size: 20px; padding: 0 18px; }
      .section { padding: 20px; }
      .result-summary { padding: 20px; }
      .dim-top { display: block; }
      .share-overlay { align-items: flex-start; overflow: auto; padding: 20px 12px; }
      .share-card { padding: 16px; }
      .share-card-title { font-size: 20px; }
      .share-card-type { font-size: 30px; }
      .share-card-key { font-size: 24px; }
      .share-card-meta { grid-template-columns: 1fr 102px; }
      .share-qr { width: 102px; height: 102px; }
      .share-actions { gap: 16px 12px; }
      .share-action { width: 70px; }
      .share-icon { width: 54px; height: 54px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section id="home" class="card hero"></section>
    <section id="test" class="hidden"></section>
    <section id="aiMode" class="hidden"></section>
    <section id="result" class="hidden card"></section>
  </main>
  <div id="toast" class="toast" aria-live="polite"></div>
  <div id="shareOverlay" class="share-overlay hidden" aria-modal="true" role="dialog"></div>
  <script>
    var DIMENSIONS = [
      { key: "context", code: "C1", name: "上下文投喂", roasts: { L: "聊天记录丢了也能活，甚至觉得重开很清爽。", M: "重要信息会补，废话也会偶尔让 AI 自己猜。", H: "你恨不得给 AI 塞一份个人设定、项目史和上一季剧情回顾。" } },
      { key: "prompt", code: "C2", name: "prompt 玄学浓度", roasts: { L: "你相信自然语言，像相信楼下便利店会开门。", M: "你知道要写清楚，但懒的时候也会说一句“懂我意思吧”。", H: "你写 prompt 像写祭文，格式、角色、步骤、禁忌一个不少。" } },
      { key: "token", code: "T1", name: "token 焦虑", roasts: { L: "你对 token 没概念，反正发出去再说。", M: "你偶尔会删废话，主要是怕 AI 看烦。", H: "你看见长对话就想压缩，像在给行李箱坐上去拉拉链。" } },
      { key: "automation", code: "A1", name: "自动化成瘾", roasts: { L: "能手动做就手动做，你和重复劳动暂时和平共处。", M: "重复三次以后会想：是不是该让 AI 接管了。", H: "你不是做任务，你是在繁殖流程。" } },
      { key: "retrieval", code: "R1", name: "检索依赖", roasts: { L: "AI 说什么你先听着，引用不引用看缘分。", M: "重要问题会要来源，日常问题先让它编个方向。", H: "没有出处的回答在你眼里像没有身份证的结论。" } },
      { key: "models", code: "M1", name: "多模型摇摆", roasts: { L: "一个 AI 用到底，主打忠诚和省心。", M: "卡住会换一个模型，像换个朋友劝自己。", H: "你的浏览器标签页像模型联席会议。" } },
      { key: "visual", code: "V1", name: "审美幻觉", roasts: { L: "你对图像视频需求朴素：能看就行。", M: "你会说“高级一点”，然后期待 AI 知道高级在哪。", H: "你一句“电影感”能让三种模型同时沉默。" } },
      { key: "price", code: "P1", name: "便宜大碗理性", roasts: { L: "该花就花，你相信好模型值得好价格。", M: "你会比较，但不会为了省一点把自己累死。", H: "你对性价比的执念已经可以单独训练一个小模型。" } },
      { key: "social", code: "S1", name: "社交型 AI 使用", roasts: { L: "你把 AI 当工具，工具不需要听你讲近况。", M: "会聊两句，但聊完还是要干活。", H: "你的 AI 可能比部分熟人更了解你今天为什么破防。" } },
      { key: "empathy", code: "H1", name: "人机共情程度", roasts: { L: "你对 AI 很冷静，错了就改，废了就换。", M: "你会礼貌说谢谢，顺手让它继续加班。", H: "你骂它幻觉之前，会先担心自己是不是没说清楚。" } },
      { key: "tooling", code: "T2", name: "工具接管欲", derivedFrom: ["automation", "context"], roasts: { L: "你还愿意自己点按钮，工具暂时只是工具。", M: "能接工具会心动，但授权前会先看两眼。", H: "你看见文件、浏览器、终端就想让 AI 全部接管。" } },
      { key: "memory", code: "M2", name: "记忆依赖症", derivedFrom: ["context", "token"], roasts: { L: "忘了就忘了，你相信重开一局也能活。", M: "重要剧情会补，但不会为每句废话建档。", H: "你恨不得把人生压缩成上下文包随身携带。" } },
      { key: "workflow", code: "W1", name: "流程洁癖", derivedFrom: ["prompt", "automation"], roasts: { L: "想到哪做到哪，AI 跟不跟得上看缘分。", M: "会写步骤，但偶尔也会让它自由发挥。", H: "你给 AI 派活像发工单，输入、输出、验收一个不少。" } },
      { key: "verification", code: "R2", name: "查证强迫", derivedFrom: ["retrieval", "prompt"], roasts: { L: "它说得顺你就先信，出处以后再说。", M: "重要的会查，不重要的就让 AI 先嘴一个。", H: "没有来源、格式和边界的答案在你眼里都像诈骗短信。" } },
      { key: "hustle", code: "B1", name: "变现雷达", derivedFrom: ["price", "social"], roasts: { L: "工具好不好玩比能不能卖更重要。", M: "看到案例会想一下，但不急着开课。", H: "你看见 AI 新功能，脑内已经弹出交付套餐和课程标题。" } }
    ];

    var PERSONAS = [
      {
        key: "cursor",
        nickname: "vibe coding 圣体",
        posterLine: "能让 AI 写就别古法手搓",

    function levelFor(score, max) {
      var ratio = max <= 0 ? 0 : score / max;
      if (ratio >= 0.67) return "H";
      if (ratio >= 0.34) return "M";
      return "L";
    }

    function dimensionValue(answer, dimension) {
      if (answer.dims[dimension.key]) return answer.dims[dimension.key];
      if (!dimension.derivedFrom) return 0;
      var values = dimension.derivedFrom.map(function (key) { return answer.dims[key] || 0; });
      return Math.round(values.reduce(function (sum, value) { return sum + value; }, 0) / values.length);
    }

    function scoreAnswers(answers) {
      if (!answers || answers.length !== QUESTIONS.length || answers.some(function (answer) { return answer === null || answer === undefined; })) {
        throw new Error("全选完才会放行。AI 都被你问累了，起码把题做完整。");
      }

      var personaScores = {};
      var personaMaxScores = {};
      var strongestHit = {};
      var dimensionScores = {};
      var dimensionMax = {};
      PERSONAS.forEach(function (persona) {
        personaScores[persona.key] = 0;
        personaMaxScores[persona.key] = 0;
        strongestHit[persona.key] = 0;
      });
      DIMENSIONS.forEach(function (dimension) {
        dimensionScores[dimension.key] = 0;
        dimensionMax[dimension.key] = 0;
      });

      QUESTIONS.forEach(function (question, index) {
        var answer = question.answers[answers[index]];
        PERSONAS.forEach(function (persona) {
          var values = question.answers.map(function (candidate) {
            return candidate.weights[persona.key] || 0;
          });
          personaMaxScores[persona.key] += Math.max.apply(null, values);
        });
        Object.keys(answer.weights).forEach(function (key) {
          personaScores[key] = (personaScores[key] || 0) + answer.weights[key];
          strongestHit[key] = Math.max(strongestHit[key] || 0, answer.weights[key]);
        });
        DIMENSIONS.forEach(function (dimension) {
          var values = question.answers.map(function (candidate) {
            return dimensionValue(candidate, dimension);
          });
          dimensionMax[dimension.key] += Math.max.apply(null, values);
        });
        DIMENSIONS.forEach(function (dimension) {
          dimensionScores[dimension.key] = (dimensionScores[dimension.key] || 0) + dimensionValue(answer, dimension);
        });
      });

      var ordered = PERSONAS.slice().sort(function (a, b) {
        var aRatio = personaMaxScores[a.key] ? (personaScores[a.key] || 0) / personaMaxScores[a.key] : 0;
        var bRatio = personaMaxScores[b.key] ? (personaScores[b.key] || 0) / personaMaxScores[b.key] : 0;
        var aAdjusted = aRatio * 100 + (personaScores[a.key] || 0) * 1.5 + (strongestHit[a.key] || 0) * 4;
        var bAdjusted = bRatio * 100 + (personaScores[b.key] || 0) * 1.5 + (strongestHit[b.key] || 0) * 4;
        var scoreDiff = bAdjusted - aAdjusted;
        if (scoreDiff) return scoreDiff;
        var hitDiff = (strongestHit[b.key] || 0) - (strongestHit[a.key] || 0);
        if (hitDiff) return hitDiff;
        return PERSONAS.indexOf(a) - PERSONAS.indexOf(b);
      });
      var persona = ordered[0];
      var topScore = personaScores[persona.key] || 0;
      var maxPersonaScore = personaMaxScores[persona.key] || QUESTIONS.length * 3;
      var match = Math.max(55, Math.min(99, Math.round(58 + topScore / maxPersonaScore * 41)));
      var personaBoosts = new Set(persona.dimBoosts);
      var dimensions = DIMENSIONS.map(function (dimension) {
        var score = dimensionScores[dimension.key] || 0;
        var max = dimensionMax[dimension.key] || 1;
        var level = levelFor(score, max);
        return {
          code: dimension.code,
          name: dimension.name,
          score: score,
          max: max,
          level: level,
          desc: dimension.roasts[level],
          hit: personaBoosts.has(dimension.key)
        };
      });
      var hitCount = dimensions.filter(function (dimension) { return dimension.level === "H" || dimension.hit; }).length;

      return { persona: persona, match: match, hitCount: hitCount, dimensions: dimensions, scores: personaScores };
    }

    function parseAnswerString(text) {
      var answers = Array(QUESTIONS.length).fill(null);
      var pattern = /(\d{1,2})\s*([ABC])/gi;
      var match;
      while ((match = pattern.exec(text || ""))) {
        var questionIndex = Number(match[1]) - 1;
        var answerIndex = optionKeys.indexOf(match[2].toUpperCase());
        if (questionIndex >= 0 && questionIndex < QUESTIONS.length && answerIndex >= 0 && answers[questionIndex] === null) {
          answers[questionIndex] = answerIndex;
        }
      }
      var count = answers.filter(function (answer) { return answer !== null; }).length;
      if (count < QUESTIONS.length) {
        throw new Error("至少需要 24 道题的答案。让 AI 按这个格式回：NBAI答案：1A 2B 3C ...");
      }
      return answers;
    }

    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      var chars = String(text).split("");
      var line = "";
      var lines = [];
      chars.forEach(function (char) {
        var next = line + char;
        if (ctx.measureText(next).width > maxWidth && line) {
          lines.push(line);
          line = char;
        } else {
          line = next;
        }
      });
      if (line) lines.push(line);
      lines.slice(0, maxLines || lines.length).forEach(function (item, index) {
        ctx.fillText(item, x, y + index * lineHeight);
      });
      return y + Math.min(lines.length, maxLines || lines.length) * lineHeight;
    }

    function canvasToBlob(canvas) {
      return new Promise(function (resolve, reject) {

          }, "image/png");
        } catch (error) {
          reject(error);
        }
      });
    }

        '<div class="result-share-row"><button class="btn btn-primary" data-action="copy-result">分享测试结果</button></div>' +
        '</div>' +
        '<section class="result-summary">' +
        '<div class="summary-label">你的主类型</div>' +
        '<h2 class="summary-type">' + escapeHtml(result.persona.key) + '（' + escapeHtml(result.persona.nickname) + '）</h2>' +
        '<div class="match">匹配度 ' + result.match + '% · 精准命中 ' + result.hitCount + '/10 个赛博症状</div>' +
        '<div class="tags">' + result.persona.tags.map(function (tag) { return '<span class="tag">' + escapeHtml(tag) + '</span>'; }).join("") + '</div>' +
        '<p class="hint">维度命中度较高，当前结果可视为你的第一 AI 人格画像。</p>' +
        '</section>' +
        '<section class="section">' +
        '<h2>该人格的简单解读</h2>' +
        '<p>' + escapeHtml(result.persona.rarity) + '</p>' +
        '<p style="margin-top: 12px;">' + escapeHtml(result.persona.description) + '</p>' +
        '</section>' +
        '<section class="section vocab">' +
        '<h2>' + escapeHtml(result.persona.key) + ' 是什么</h2>' +
        '<p>' + escapeHtml(result.persona.vocab) + '</p>' +
        '</section>' +
        '<section class="section">' +
        '<h2>NBAI 十五维度评分</h2>' +
        '<div class="dim-list">' +
        result.dimensions.map(function (dimension) {
          return '<div class="dim">' +
            '<div class="dim-top"><span>' + dimension.code + ' ' + escapeHtml(dimension.name) + '</span><span>' + dimension.level + ' / ' + dimension.score + '分</span></div>' +
            '<div class="dim-desc">' + escapeHtml(dimension.desc) + '</div>' +
            '</div>';
        }).join("") +
        '</div>' +
        '</section>' +
        '<section class="section">' +
        '<h2>友情提示</h2>' +
        '<p>本测试仅供娱乐，别拿它做人生重大决策。AI 有幻觉，人类也会自我欺骗，准确性取决于你和 AI 谁更会自欺欺人。</p>' +
        '<p class="hint">做本测试初衷是想让小白同学更了解ai也更了解自己，并科普一些黑话和词汇，从一个ai builder 变成 influencer。</p>' +
        '<div class="result-actions">' +
        '<button class="btn btn-secondary" data-action="restart">重新测试</button>' +
        '<button class="btn btn-primary" data-action="home">回到首页</button>' +
        '</div>' +
        '</section>';
      showView("result");
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text).then(function () { return true; }).catch(function () { return fallbackCopy(text); });
      }
      return Promise.resolve(fallbackCopy(text));
    }

    function fallbackCopy(text) {
      var area = document.createElement("textarea");
      area.value = text;
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      var ok = false;
      try { ok = document.execCommand("copy"); } catch (error) { ok = false; }
      area.remove();
      return ok;
    }

    function handleAction(action, event) {
      if (action === "start" || action === "manual") {
        state.answers = Array(QUESTIONS.length).fill(null);
        renderTest();
      }
      if (action === "ai-mode") renderAiMode();
      if (action === "home") showView("home");
      if (action === "submit") {
        try { renderResult(scoreAnswers(state.answers)); }
        catch (error) { toast(error.message); }
      }
      if (action === "copy-prompt") {
        copyText(buildAiPrompt()).then(function () { toast("prompt 已复制，去让 AI 出卖你。"); });
      }
      if (action === "parse-ai") {
        var errorEl = byId("parseError");
        try {
          var parsed = parseAnswerString(byId("answerPaste").value);
          state.answers = parsed;
          errorEl.classList.add("hidden");
          errorEl.textContent = "";
          renderResult(scoreAnswers(parsed));
        } catch (error) {
          errorEl.textContent = error.message;
          errorEl.classList.remove("hidden");
          toast("AI 的答案串有点散，抓回来重排。");
        }
      }
      if (action === "copy-result" && state.lastResult) renderShareOverlay();
      if (action === "close-share") closeShareOverlay();
      if (action === "save-share-image") downloadShareImage();
      if (action === "share-channel" && state.lastResult) {
        var channel = event.target.closest("[data-channel]").dataset.channel;
        openShareChannel(channel);
      }
      if (action === "copy-recognition" && state.lastResult) {
        copyText("这是我的 NBAI 结果，你认吗？\n\n" + resultText(state.lastResult)).then(function () { toast("已复制给 AI 质询专用文本。"); });
      }
      if (action === "restart") {
        state.answers = Array(QUESTIONS.length).fill(null);
        renderHome();
        showView("home");
      }
    }

    document.addEventListener("click", function (event) {
      if (event.target.id === "shareOverlay") {
        closeShareOverlay();
        return;
      }
      var option = event.target.closest(".option");
      if (option) {
        var questionIndex = Number(option.dataset.question);
        var answerIndex = Number(option.dataset.answer);
        state.answers[questionIndex] = answerIndex;
        var question = option.closest(".question");
        question.querySelectorAll(".option").forEach(function (candidate) {
          candidate.classList.toggle("selected", candidate === option);
        });
        renderProgress();
        return;
      }
      var actionEl = event.target.closest("[data-action]");
      if (actionEl) handleAction(actionEl.dataset.action, event);
    });

    document.addEventListener("DOMContentLoaded", function () {
      renderHome();
      showView("home");
    });

    if (document.readyState !== "loading") {
      renderHome();
      showView("home");
    }
  </script>
</body>
</html>
